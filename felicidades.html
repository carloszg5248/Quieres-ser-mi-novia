<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ahora Somos Novios 💘</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20%;
    font-size:3em;
    animation:show 2s ease-in-out;
}

@keyframes show{
    from{opacity:0;}
    to{opacity:1;}
}

.firework{
    position:absolute;
    font-size:30px;
    animation:boom 1s forwards;
}

@keyframes boom{
    from{transform:scale(0);}
    to{transform:scale(3);opacity:0;}
}
</style>
</head>

<body>

<h1>🎉 ¡FELICIDADES! 💖<br>Ahora somos novios 💘</h1>

<script>
setInterval(()=>{
    const f=document.createElement("div");
    f.className="firework";
    f.innerHTML="🎆";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
},400);
</script>

</body>
</html>
