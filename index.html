<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti 💘</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            text-align: center;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #ff4e8b;
            width: 80%;
            max-width: 400px;
        }

        .nombre { font-size: 24px; color: #ff4e8b; margin: 15px 0; font-weight: bold; }

        .buttons {
            margin-top: 50px;
            height: 60px;
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            z-index: 3;
        }

        #siBtn { background: #ff4e8b; color: white; }

        #noBtn {
            background: white;
            color: #ff4e8b;
            transition: all 0.2s ease;
            touch-action: none; /* Importante para móviles */
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="card">
        <h1>💘 ¿Quieres ser mi novia? 💘</h1>
        <div class="nombre">❤️ ROSA ❤️</div>
        <p>Prometo hacerte feliz todos los días 💖</p>
        
        <div class="buttons">
            <button id="siBtn" onclick="aceptar()">Sí 💖</button>
            <button id="noBtn" onmouseover="moveBtn()" ontouchstart="moveBtn()">No 😢</button>
        </div>
    </div>

    <script>
        /* ESTRELLAS */
        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = Array(100).fill().map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            v: 0.5 + Math.random()
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, 1, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.v;
                if (s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();

        /* LÓGICA DEL BOTÓN NO */
        const noBtn = document.getElementById("noBtn");
        let attempts = 0;

        function moveBtn() {
            attempts++;
            // En móviles usamos 'fixed' para que se mueva por toda la pantalla real
            noBtn.style.position = "fixed";
            
            // Calculamos límites para que el botón no se salga de la pantalla
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";

            if (attempts > 8) {
                noBtn.style.display = "none"; // Se rinde después de 8 intentos
            }
        }

        /* ACEPTAR */
        function aceptar() {
            // Usamos una ruta relativa simple para GitHub Pages
            window.location.href = "felicidades.html";
        }
    </script>
</body>
</html>
